services:
  backend:
    container_name: fithub-backend
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    env_file:
      - /home/quikkkk/fithub-env/.env
    depends_on:
      - redis
    networks:
      - network
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass password123 --appendonly yes
    restart: unless-stopped
  mail-dev:
    container_name: mail-dev
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
  minio:
    image: minio/minio:latest
    container_name: fithub-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - network

volumes:
  pgdata:
  redis_data:
  minio_data:

networks:
  network:
    driver: bridge
