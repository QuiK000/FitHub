services:
  backend:
    container_name: fithub-backend
    build:
      context: ...
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - redis
    networks:
      - network
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass password123 --appendonly yes
    restart: unless-stopped
  mail-dev:
    container_name: mail-dev
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"

volumes:
  pgdata:
  redis_data:

networks:
  network:
    driver: bridge
