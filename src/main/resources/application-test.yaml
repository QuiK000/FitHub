spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/fithub_testdb}
    username: ${TEST_DB_USERNAME}
    password: ${TEST_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    clean-disabled: false

  data:
    redis:
      host: localhost
      port: 6379
      password: testPassword

  mail:
    host: localhost
    port: 1025
    username: test
    password: test

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m

app:
  email:
    max-retry-attempts: 3
    retry-delay-minutes: 1
  frontend:
    url: http://localhost:4200
  security:
    jwt:
      auto-generate: true
      access-token-expiration: 3600000
      refresh-token-expiration: 86400000
    disposable-email: mailinator,tempmail,guerrillamail

logging:
  level:
    root: WARN
    com.dev.quikkkk: DEBUG
    org.springframework.security: WARN
    org.hibernate: WARN