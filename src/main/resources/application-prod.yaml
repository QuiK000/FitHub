spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}?prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

app:
  frontend:
    url: ${FRONTEND_URL}
  security:
    jwt:
      auto-generate: false
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:684000000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:${FRONTEND_URL}}

logging:
  level:
    root: WARN
    com.dev.quikkkk: INFO
    org.springframework.security: WARN
    org.hibernate: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
